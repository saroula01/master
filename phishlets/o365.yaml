  - domain: ".office.com"
    keys: ["ESTSAUTH", "ESTSAUTHPERSISTENT", "x-ms-RefreshTokenCredential", "OIDCAuthCookie", "ClientId", "FedAuth", "rtFa", ".*,regexp"]

  - domain: "www.office.com"
    keys: ["ESTSAUTH", "ESTSAUTHPERSISTENT", "x-ms-RefreshTokenCredential", "OIDCAuthCookie", "ClientId", "FedAuth", "rtFa", ".*,regexp"]

